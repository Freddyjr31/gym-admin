name: gym_admin
description: "Aplicación de escritorio para Windows desarrollada en Flutter.
  Permite gestionar recetas, ingredientes y costos de producción,
  con una interfaz moderna basada en Fluent UI."

publish_to: 'none'
version: 0.1.0+0013

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
      sdk: flutter
  fluent_ui: ^4.15.0
  hive:
  hive_flutter:
  msix: ^3.16.13
  package_info_plus: ^9.0.0
  provider: ^6.1.5+1


dev_dependencies:
  flutter_test:
      sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator:
  build_runner:
  

flutter:
  uses-material-design: true
  assets:
    - assets/images/

msix_config:
  display_name: AF RecipeCost  # Nombre que verá el usuario
  publisher_display_name: AF
  publisher: 'CN=AF' # Requerido para el certificado
  identity_name: com.af.gymadmin
  msix_version: 1.0.0.1
  # logo_path: assets/logo.png # Ruta al icono de tu app
  capabilities: "internetClient, location" # Permisos que necesita
  description: "Aplicación de escritorio para Windows desarrollada en Flutter. Permite gestionar recetas, ingredientes y costos de producción, con una interfaz moderna basada en Fluent UI."